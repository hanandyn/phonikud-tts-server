services:
  phonikud-tts:
    image: hanandyn/phonikud-tts:latest
    container_name: phonikud-tts
    ports:
      - "8880:8880"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
