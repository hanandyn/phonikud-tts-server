services:
  phonikud-tts:
    image: hanandyn/phonikud-tts:latest
    container_name: phonikud-tts
    ports:
      - "8880:8880"
    restart: unless-stopped
    mem_limit: 4g
    mem_reservation: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
